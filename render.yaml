services:
  - type: web
    name: aha-engine-staging
    runtime: docker
    rootDir: backend/aha_engine
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AHA_ENGINE_ALLOWED_ORIGINS
        value: "http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500,https://paradispartiet.github.io"
