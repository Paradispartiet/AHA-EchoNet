<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lister</title>
  <link rel="stylesheet" href="aha-chat.css" />
  <link rel="stylesheet" href="aha-dashboard.css" />
  <link rel="stylesheet" href="aha-lists.css" />
</head>
<body>
  <main class="aha-dashboard aha-lists-layout" style="max-width: 1000px;">
    <section class="aha-panel">
      <p class="eyebrow">AHA Modul</p>
      <h1>Lister</h1>
      <p>Samle referanser fra innsikter, notater, feed, galleri og insta i egne arbeidslister.</p>
      <div class="aha-tile-actions">
        <a class="aha-tile-btn aha-tile-btn-primary" href="index.html">Tilbake til AHA Home</a>
        <button type="button" id="lists-refresh">Oppdater</button>
      </div>
    </section>

    <section class="aha-panel">
      <h2>Opprett liste</h2>
      <form id="list-create-form" class="aha-list-form-grid">
        <label>
          Tittel
          <input id="list-title" name="title" required />
        </label>
        <label>
          Type
          <select id="list-type" name="type">
            <option value="favorites">favorites</option>
            <option value="todo">todo</option>
            <option value="concepts">concepts</option>
            <option value="process">process</option>
            <option value="quality">quality</option>
            <option value="ai">ai</option>
            <option value="shared_later">shared_later</option>
          </select>
        </label>
        <label>
          Beskrivelse
          <textarea id="list-description" name="description" rows="2"></textarea>
        </label>
        <label>
          Tags (kommaseparert)
          <input id="list-tags" name="tags" />
        </label>
        <div>
          <button type="submit">Lag liste</button>
        </div>
      </form>
    </section>

    <section class="aha-list-stats">
      <article class="aha-list-stat-card">
        <span>Antall lister</span>
        <strong id="lists-count">0</strong>
      </article>
      <article class="aha-list-stat-card">
        <span>Antall listepunkter totalt</span>
        <strong id="list-items-count">0</strong>
      </article>
    </section>

    <section id="lists-list" class="aha-lists-layout"></section>
  </main>

  <script src="ahaContracts.js"></script>
  <script src="ahaGroups.js"></script>
  <script src="ahaLists.js"></script>
</body>
</html>
