<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>AHA Galleri</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/aha-chat.css" />
  <link rel="stylesheet" href="css/aha-dashboard.css" />
  <link rel="stylesheet" href="css/ahaModule.css" />
  <link rel="stylesheet" href="css/aha-gallery.css" />
  <link rel="stylesheet" href="css/aha-global-nav.css" />
</head>
<body>
  <div id="aha-global-nav"></div>
  <main class="aha-dashboard" style="max-width: 900px;">
    <section class="aha-panel aha-module-shell">
      <header class="aha-module-shell-header">
        <div>
          <p class="eyebrow">AHA Modul</p>
          <h1>AHA Galleri</h1>
          <p class="aha-module-purpose">Lokalt galleri for bilder, minner og visuelle uttrykk. Gallery lagrer bare lokale referanser, er ikke delt, og bildeanalyse er ikke aktivert.</p>
        </div>
      </header>
      <div class="aha-module-actions">
        <a class="aha-tile-btn aha-tile-btn-primary" href="index.html">Tilbake til AHA Home</a>
      </div>
    </section>

    <section class="aha-panel">
      <form id="gallery-form" class="module-form">
        <input id="gallery-title" type="text" placeholder="Tittel" />
        <input id="gallery-src" type="text" placeholder="Lokal bilde-/videoreferanse eller path" />
        <textarea id="gallery-description" placeholder="Beskrivelse / minne / kontekst …"></textarea>
        <button type="submit">Lagre lokalt og send tekst til AHA</button>
      </form>
    </section>

    <section class="aha-panel">
      <h2>Lokalt galleri</h2>
      <p class="aha-module-purpose">Ikke delt. Bildeanalyse ikke aktivert.</p>
      <div id="gallery-list" class="module-list"></div>
    </section>
  </main>

  <script src="js/insightsChamber.js"></script>
  <script src="js/metaInsightsEngine.js"></script>
  <script src="js/theoryClustersLoader.js"></script>
  <script src="js/ahaFieldProfiles.js"></script>
  <script src="js/ahaSources.js"></script>
  <script src="js/emnerLoader.js"></script>
  <script src="js/ahaEmneMatcher.js"></script>
  <script src="js/ahaEmbeddings.js"></script>
  <script src="js/ahaIngest.js"></script>
  <script src="js/ahaContracts.js"></script>
  <script src="js/ahaGallery.js"></script>
<script src="js/ahaModules.js"></script>
<script src="js/ahaGlobalNav.js"></script>
</body>
</html>
