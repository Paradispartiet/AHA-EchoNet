name: AHA syntax check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - build-aha-components-historygo-import
      - add-supabase-database-layer
      - add-auth-and-rls-policies
      - add-auth-callback-flow
  workflow_dispatch:

jobs:
  node-check:
    name: Node syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check JavaScript syntax
        shell: bash
        run: |
          set -euo pipefail

          # Check every tracked JS file so new modules are covered automatically
          # and the list never drifts out of date.
          mapfile -t files < <(git ls-files '*.js' '*.mjs' '*.cjs')

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No JavaScript files found to check."
            exit 1
          fi

          echo "Checking ${#files[@]} JavaScript files"
          for file in "${files[@]}"; do
            echo "Checking $file"
            node --check "$file"
          done
