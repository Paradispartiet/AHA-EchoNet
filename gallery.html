<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>AHA Galleri</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/aha-chat.css" />
  <link rel="stylesheet" href="css/ahaModule.css" />
  <link rel="stylesheet" href="css/aha-gallery.css" />
</head>
<body>
  <p><a href="index.html">← AHA Dashboard</a></p>
  <header class="module-header">
    <h1>AHA Galleri</h1>
    <p>Personlig galleri for bilder, minner og visuelle uttrykk. Første MVP bruker URL/path, ikke filopplasting.</p>
  </header>

  <form id="gallery-form" class="module-form">
    <input id="gallery-title" type="text" placeholder="Tittel" />
    <input id="gallery-src" type="text" placeholder="Bilde-/videoadresse eller path" />
    <textarea id="gallery-description" placeholder="Beskrivelse / minne / kontekst …"></textarea>
    <button type="submit">Legg til i galleri</button>
  </form>

  <section>
    <h2>Galleri</h2>
    <div id="gallery-list" class="module-list"></div>
  </section>

  <script src="js/insightsChamber.js"></script>
  <script src="js/metaInsightsEngine.js"></script>
  <script src="js/theoryClustersLoader.js"></script>
  <script src="js/ahaFieldProfiles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/ahaConfig.js"></script>
  <script src="js/ahaDb.js"></script>
  <script src="js/ahaAuth.js"></script>
  <script src="js/ahaRepository.js"></script>
  <script src="js/ahaChamberSync.js"></script>
  <script src="js/ahaSources.js"></script>
  <script src="js/emnerLoader.js"></script>
  <script src="js/ahaEmneMatcher.js"></script>
  <script src="js/ahaEmbeddings.js"></script>
  <script src="js/ahaIngest.js"></script>
  <script src="js/ahaContracts.js"></script>
  <script src="js/ahaGallery.js"></script>
</body>
</html>
